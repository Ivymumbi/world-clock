<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock-Ivy Mumbi</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select>
        <option value="">Select a city</option>
        <option value="">Nairobi</option>
        <option value="">Kigali</option>
      </select>
      <div class="city">
        <div>
          <h2>Nairobi</h2>
          <div class="date">14TH March 2026</div>
        </div>
        <div class="time">1:53:38 <small>PM</small></div>
      </div>
      <div class="city">
        <div>
          <h2>Cairo</h2>
          <div class="date">14TH March 2026</div>
        </div>
        <div class="time">1:53:38 <small>PM</small></div>
      </div>
    </div>
    <footer>
      This project was coded by<a
        href="https://github.com/Ivymumbi"
        target="_blank"
      >
        Ivy Mumbi</a
      >
      and is<a href="https://github.com/Ivymumbi/world-clock" target="_blank">
        open-sourced on Github</a
      >
      and hosted on Render
    </footer>
    <script src="app.js"></script>
  </body>
</html>
